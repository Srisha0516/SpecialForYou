<!DOCTYPE html>
<html>
<head>

<title>For You 💚</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(to right,#00FF7F,#b8ffd8);
color:#064d2f;
text-align:center;
}

/* birthday screen */
#birthday{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* hide main first */
#main{
display:none;
padding:20px;
}

/* message box */
.message-box{
background:white;
padding:30px;
border-radius:20px;
width:60%;
margin:auto;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* photos grid (simple & safe) */
.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:30px;
}

.gallery img{
width:150px;
height:150px;
object-fit:cover;
border-radius:15px;
}

</style>

</head>

<body>

<!-- 🎉 Birthday -->
<div id="birthday">
<h1>🎉 Happy Birthday 💚</h1>
<p>You deserve all the happiness in the world ✨</p>
</div>

<!-- 💚 Main Content -->
<div id="main">

<div class="message-box">
<h2>You, Through My Eyes 💚</h2>
<p id="text"></p>
</div>

<!-- 📸 Photos -->
<div class="gallery">

<img src="be3d9d03-9171-4a28-a863-80d63b6383cf.jpg">
<img src="6222e97a-15e5-4f23-9a38-510b3bd8c2b6.jpg">
<img src="5f6127d1-f402-4bf7-a9f0-8fd42cbdf061.jpg">
<img src="e50b7ca2-50a1-488d-a63e-6b870fe67d83.jpg">
<img src="631a6283-dd65-4090-b085-1ad47f0e62fd.jpg">

<img src="2be4a050-56c9-4509-9f26-03703da0e1ab.jpg">
<img src="11b1926b-ef85-4412-8c93-10512320e003.jpg">
<img src="811d6136-3607-4825-9aa8-fb04ce182d00.jpg">
<img src="25dde7e1-fe57-4b42-923f-4ab4023a9b4d.jpg">
<img src="295db281-7f4d-41f2-9576-ad54a172ed21.jpg">

<img src="c77a1a4c-3698-4cf2-9381-5aed57c88183.jpg">
<img src="c8685019-39f5-402d-86f5-90d55262ac02.jpg">
<img src="349fc28e-44b3-41c2-b0b5-363170120a03.jpg">

</div>

</div>

<script>

// show main after 4 sec
setTimeout(function(){
document.getElementById("birthday").style.display="none";
document.getElementById("main").style.display="block";
typeText();
},4000);

// typing effect
var msg="You are someone who brings happiness wherever you go... 💚 Your smile, your kindness, and your presence make everything better. You make my world brighter just by being in it ✨ And honestly... you're one of the most special people to me 💚";

var i=0;

function typeText(){
if(i<msg.length){
document.getElementById("text").innerHTML += msg.charAt(i);
i++;
setTimeout(typeText,30);
}
}

</script>

</body>
</html>
