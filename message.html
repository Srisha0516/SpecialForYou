<!DOCTYPE html>
<html>
<head>

<title>For You 💚</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(to right,#00FF7F,#b8ffd8);
color:#064d2f;
text-align:center;
overflow:hidden;
}

/* birthday */
#birthday{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(to right,#00FF7F,#b8ffd8);
z-index:10;
}

/* hide main first */
#main{
display:none;
}

/* message box */
.message-box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:20px;
width:60%;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
z-index:2;
}

/* text typing */
#text{
font-size:18px;
line-height:1.6;
}

/* photos */
.photo{
position:absolute;
width:100px;
height:100px;
border-radius:12px;
object-fit:cover;
opacity:0.9;
}

/* simple positions (safe) */
.p1{top:5%;left:5%;}
.p2{top:5%;right:5%;}
.p3{top:25%;left:10%;}
.p4{top:25%;right:10%;}
.p5{bottom:10%;left:10%;}
.p6{bottom:10%;right:10%;}
.p7{top:60%;left:40%;}
.p8{top:10%;left:40%;}

</style>

</head>

<body>

<!-- 🎉 BIRTHDAY -->
<div id="birthday">
<h1>🎉 Happy Birthday 💚</h1>
<p>You deserve all the happiness ✨</p>
</div>

<!-- 💚 MAIN -->
<div id="main">

<div class="message-box">
<h2>You, Through My Eyes 💚</h2>
<p id="text"></p>
</div>

<!-- 📸 PHOTOS (SAFE LIMIT) -->
<img src="be3d9d03-9171-4a28-a863-80d63b6383cf.jpg" class="photo p1">
<img src="6222e97a-15e5-4f23-9a38-510b3bd8c2b6.jpg" class="photo p2">
<img src="5f6127d1-f402-4bf7-a9f0-8fd42cbdf061.jpg" class="photo p3">
<img src="e50b7ca2-50a1-488d-a63e-6b870fe67d83.jpg" class="photo p4">
<img src="631a6283-dd65-4090-b085-1ad47f0e62fd.jpg" class="photo p5">
<img src="2be4a050-56c9-4509-9f26-03703da0e1ab.jpg" class="photo p6">
<img src="11b1926b-ef85-4412-8c93-10512320e003.jpg" class="photo p7">
<img src="811d6136-3607-4825-9aa8-fb04ce182d00.jpg" class="photo p8">

</div>

<script>

// switch screen
setTimeout(function(){
document.getElementById("birthday").style.display="none";
document.getElementById("main").style.display="block";
startTyping();
},3000);

// typing effect
var msg="You are someone who brings happiness wherever you go... 💚 Your smile makes everything better. You are truly special to me 💚";

var i=0;

function startTyping(){
if(i < msg.length){
document.getElementById("text").innerHTML += msg.charAt(i);
i++;
setTimeout(startTyping,40);
}
}

</script>

</body>
</html>
