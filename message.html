<!DOCTYPE html>
<html>
<head>

<title>For You 💚</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(to right,#00FF7F,#b8ffd8);
color:#064d2f;
text-align:center;
}

/* center message */
.message-box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:40px;
border-radius:25px;
width:60%;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
z-index:2;
}

.message-box h1{
margin-bottom:20px;
}

.message-box p{
font-size:18px;
line-height:1.6;
}

/* floating photos */
.photo{
position:absolute;
width:120px;
height:120px;
object-fit:cover;
border-radius:15px;
opacity:0.85;
animation:float 8s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-25px);}
100%{transform:translateY(0);}
}

</style>

</head>

<body>

<div class="message-box">

<h1>You, Through My Eyes 💚</h1>

<p>
You are someone who brings happiness wherever you go... 💚  
Your smile, your kindness, and your presence make everything better.  
You make my world brighter just by being in it ✨  
And honestly... you're one of the most special people to me 💚
</p>

</div>
