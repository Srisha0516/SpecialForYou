<!DOCTYPE html>

<head>

<title>For You 💚</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(to right,#00FF7F,#b8ffd8);
color:#064d2f;
text-align:center;
}

/* birthday */
#birthday{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:10;
}

#mainContent{
display:none;
}

/* message box */
.message-box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:35px;
border-radius:25px;
width:55%;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
z-index:2;
}

#text{
font-size:20px;
line-height:1.6;
min-height:80px;
}

/* photos */
.photo{
position:absolute;
width:105px;
height:105px;
object-fit:cover;
border-radius:15px;
opacity:0.9;
animation:float 5s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-20px);}
100%{transform:translateY(0);}
}

</style>

</head>

<body>

<!-- 🎉 BIRTHDAY -->
<div id="birthday">
<h1>🎉 Happy Birthday 💚</h1>
<p>You deserve all the happiness in the world ✨</p>
</div>

<!-- 💚 MAIN -->
<div id="mainContent">

<div class="message-box">
<h1>You, Through My Eyes 💚</h1>
<p id="text"></p>

<script>

// birthday delay
setTimeout(function(){
document.getElementById("birthday").style.display="none";
document.getElementById("mainContent").style.display="block";
typeText();
},4000);

// typing effect
var msg="You are someone who brings happiness wherever you go... 💚 Your smile, your kindness, and your presence make everything better. You make my world brighter just by being in it ✨ And honestly... you're one of the most special people to me 💚";

var i=0;

function typeText(){
if(i<msg.length){
document.getElementById("text").innerHTML+=msg.charAt(i);
i++;
setTimeout(typeText,35);
}
}

</script>
