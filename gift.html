<!DOCTYPE html>
<html>
<head>

<title>Special For You 💚</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
text-align:center;
background:linear-gradient(to right,#00FF7F,#b8ffd8);
color:#064d2f;
}

/* container */
.container{
padding:40px;
padding-bottom:120px; /* space for button */
}

h1{
margin-bottom:20px;
}

/* typing message */
#message{
font-size:28px;
font-weight:bold;
min-height:60px;
margin-bottom:30px;
}

/* audio */
audio{
margin:20px 0;
}

/* gallery */
.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}

.gallery img{
width:220px;
height:220px;
object-fit:cover;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.08);
}

/* 💚 FIXED BUTTON */
.next-btn{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
z-index:999;
}

.next-btn button{
padding:14px 40px;
background:#00FF7F;
border:none;
border-radius:30px;
color:#064d2f;
font-size:18px;
cursor:pointer;
font-weight:bold;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
transition:0.3s;
}

.next-btn button:hover{
background:#00cc66;
transform:scale(1.08);
}

</style>

</head>

<body>

<div class="container">

<h1>Something for You 💚</h1>

<!-- Typing Message -->
<div id="message"></div>

<!-- 🎵 SONG -->
<audio autoplay loop controls>
<source src="song.mp3" type="audio/mpeg">
</audio>

<!-- Photos -->
<div class="gallery">
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
</div>

</div>

<!-- ✅ ALWAYS VISIBLE BUTTON -->
<div class="next-btn">
<button onclick="nextPage()">Next 💚</button>
</div>

<script>

// typing effect
var text="You are one of the most special people in my life... 💚 Thank you for all the smiles, memories, and moments we share.";

var i=0;

function typing(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,40);
}
}

typing();

// next page
function nextPage(){
window.location.href="message.html";
}

</script>

</body>
</html>
